[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
cache_path = "cache"
solc_version = "0.8.24"
evm_version = "paris"
optimizer = true
optimizer_runs = 800
bytecode_hash = "ipfs"
extra_output = ["storageLayout"]
remappings = [
    "openzeppelin-contracts/=lib/openzeppelin-contracts/",
    "forge-std/=lib/openzeppelin-contracts/lib/forge-std/src/"
]

[fmt]
line_length = 100

